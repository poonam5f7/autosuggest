<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>  
    <style>
        .left-bar{
            position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar{
            position: fixed;
            top: 20px;
            right: 20px;
        }
        .main-section{
            text-align: center;
            margin-top: 200px;
        }
        .lens{
            left: 50px;
            position: relative;
        }
        .search-input{
            padding: 15px 15px 15px 45px;
            width: 40%;
            border-radius: 30px;
        }
        #suggestion-box{
            border: 1px solid rgb(87, 59, 59);
            width: 45%;
            margin-left: 30%;
        }
    </style> 
</head>
    <style> 
        body{
            text-align: center;
            }
            span{
                padding: 10px;
            }
    </style> 
<body>
    <div> 
        <span class="left-bar">&#9881;</span>
        <span class="right-bar">&#x2022; online | &#x1F552 -ms</span>
    </div>
    <div class="main-section">
        <h1><span style="color: purple;">Being</span>Infinity</h1>
        <p> One million phrases. Four algorithms. Prefix Based Auto Suggest</p>
        <span>
            <span class="lens">&#128269;</span>
            <input class="search-input" placeholder="Start typing to search phrases">
        </span>
        <div id="suggestion-box">
            Suggestion box
        </div>
    </div>
</body>
</html>
